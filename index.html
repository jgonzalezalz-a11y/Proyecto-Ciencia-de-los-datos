<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Predicción de Ubicación Estudiantil</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="container mt-5 mb-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card card-custom p-4">
                <h2 class="text-center mb-4">Sistema de Predicción de Empleabilidad</h2>
                <p class="text-muted text-center">Ingresa los datos del estudiante para estimar su estado de colocación y salario.</p>
                
                <form id="predictionForm">
                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label for="cgpa" class="form-label">Promedio Académico (CGPA)</label>
                            <input type="number" step="0.01" class="form-control" id="cgpa" required placeholder="Ej. 8.5">
                        </div>
                        <div class="col-md-6">
                            <label for="codingScore" class="form-label">Puntaje en Programación (0-100)</label>
                            <input type="number" step="0.01" class="form-control" id="codingScore" required placeholder="Ej. 85.5">
                        </div>
                    </div>

                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label for="internships" class="form-label">Número de Pasantías</label>
                            <input type="number" class="form-control" id="internships" required placeholder="Ej. 2">
                        </div>
                        <div class="col-md-6">
                            <label for="collegeTier" class="form-label">Nivel de Universidad</label>
                            <select class="form-select" id="collegeTier" required>
                                <option value="Tier 1">Tier 1</option>
                                <option value="Tier 2">Tier 2</option>
                                <option value="Tier 3">Tier 3</option>
                            </select>
                        </div>
                    </div>

                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label for="branch" class="form-label">Rama / Carrera</label>
                            <select class="form-select" id="branch" required>
                                <option value="CSE">Ciencias de la Computación (CSE)</option>
                                <option value="IT">Tecnología de la Información (IT)</option>
                                <option value="EEE">Ingeniería Eléctrica/Electrónica (EEE)</option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label for="projects" class="form-label">Número de Proyectos</label>
                            <input type="number" class="form-control" id="projects" required placeholder="Ej. 4">
                        </div>
                    </div>

                    <div class="d-grid gap-2 mt-4">
                        <button type="submit" class="btn btn-primary btn-lg">Realizar Predicción</button>
                    </div>
                </form>

                <div id="resultSection" class="result-section alert text-center">
                    <h4 id="predictionStatus" class="mb-2"></h4>
                    <p id="predictionSalary" class="mb-0 fs-5"></p>
                </div>

            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script src="script.js"></script>

</body>
</html>
